# docker-compose.dev.yml — Dev testability stack (no custom Dockerfile)
#
# Usage (from repo root):
#   docker compose -f packaging/docker/docker-compose.dev.yml up
#
# Then open the printed Web UI URL — already wired to headless, no config needed.
#
# Env overrides (optional, via .env or export):
#   IPOLLOWORK_TOKEN        — shared client token (auto-generated if unset)
#   IPOLLOWORK_HOST_TOKEN   — host/admin token (auto-generated if unset)
#   IPOLLOWORK_WORKSPACE    — host path to mount as workspace (default: ./workspace)
#   IPOLLOWORK_PORT         — host port to map to container :8787 (default: 8787)
#   WEB_PORT              — host port to map to container :5173 (default: 5173)
#   IPOLLOWORK_DEV_ID       — unique ID for this stack (default: default)
#   IPOLLOWORK_DEV_MODE     — enables isolated OpenCode dev state
#   IPOLLOWORK_PUBLIC_HOST  — browser-facing host/IP for LAN-accessible URLs
#   IPOLLOWORK_DOCKER_DEV_MOUNT_HOST_OPENCODE=1 — import host OpenCode config/auth into the isolated dev state
#   IPOLLOWORK_OPENCODE_CONFIG_DIR      — host OpenCode config dir detection override
#   IPOLLOWORK_OPENCODE_DATA_DIR        — host OpenCode data dir detection override
#   IPOLLOWORK_HOST_OPENCODE_CONFIG_DIR — import source for OpenCode config
#   IPOLLOWORK_HOST_OPENCODE_DATA_DIR   — import source for OpenCode auth/data

x-shared: &shared
  image: node:22-bookworm-slim
  working_dir: /app
  volumes:
    # Mount the entire repo so both services share node_modules + source
    - ../../:/app
    - pnpm-store:/root/.local/share/pnpm/store
    - bun-install:/root/.bun
    - ${IPOLLOWORK_WORKSPACE:-./workspace}:/workspace
    - ${IPOLLOWORK_HOST_OPENCODE_CONFIG_DIR:-./workspace/.ipollowork-host-opencode-config}:/persist/.config/opencode:ro
    - ${IPOLLOWORK_HOST_OPENCODE_DATA_DIR:-./workspace/.ipollowork-host-opencode-data}:/persist/.ipollowork-host-opencode-data:ro

services:
  orchestrator:
    <<: *shared
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e

        # --- Ensure workspace dir is writable ---
        mkdir -p /workspace && touch /workspace/.keep 2>/dev/null || true

        # --- Install system deps ---
        apt-get update -qq && apt-get install -y -qq --no-install-recommends \
          curl ca-certificates unzip git >/dev/null 2>&1

        # --- Install bun (cached in named volume) ---
        export BUN_INSTALL="/root/.bun"
        export PATH="$$BUN_INSTALL/bin:$$PATH"
        if ! command -v bun >/dev/null 2>&1; then
          echo "[orchestrator] Installing bun..."
          curl -fsSL https://bun.sh/install | bash
        fi

        # --- Enable pnpm via corepack ---
        corepack enable && corepack prepare pnpm@10.27.0 --activate

        # --- Install deps ---
        echo "[orchestrator] Installing dependencies..."
        pnpm install --no-frozen-lockfile --network-concurrency 1 --child-concurrency 1

        # --- Use source entrypoints for the dev stack ---
        # The orchestrator can spawn .ts files via Bun directly, which avoids bind-mount
        # issues from bun --compile inside Docker on macOS.
        export IPOLLOWORK_SERVER_BIN="/app/apps/server/src/cli.ts"

        # --- Resolve tokens ---
        if [ -z "$$IPOLLOWORK_TOKEN" ]; then
          IPOLLOWORK_TOKEN=$$(cat /proc/sys/kernel/random/uuid)
          export IPOLLOWORK_TOKEN
        fi
        if [ -z "$$IPOLLOWORK_HOST_TOKEN" ]; then
          IPOLLOWORK_HOST_TOKEN=$$(cat /proc/sys/kernel/random/uuid)
          export IPOLLOWORK_HOST_TOKEN
        fi

        # Write tokens so the web service can source them
        mkdir -p /app/tmp
        printf 'IPOLLOWORK_TOKEN=%s\nIPOLLOWORK_HOST_TOKEN=%s\n' \
          "$$IPOLLOWORK_TOKEN" "$$IPOLLOWORK_HOST_TOKEN" > "/app/tmp/.dev-env-${IPOLLOWORK_DEV_ID:-default}"

        echo ""
        echo "============================================"
        echo "  iPolloWork orchestrator"
        echo "  Server:     http://localhost:${IPOLLOWORK_PORT:-8787}"
        echo "  Health:     http://localhost:${IPOLLOWORK_PORT:-8787}/health"
        echo "  Token:      $$IPOLLOWORK_TOKEN"
        echo "  Host token: $$IPOLLOWORK_HOST_TOKEN"
        echo "============================================"
        echo ""

        exec pnpm --filter ipollowork-orchestrator dev -- start \
          --workspace /workspace \
          --remote-access \
          --ipollowork-port 8787 \
          --ipollowork-token "$$IPOLLOWORK_TOKEN" \
          --ipollowork-host-token "$$IPOLLOWORK_HOST_TOKEN" \
          --ipollowork-server-bin "$$IPOLLOWORK_SERVER_BIN" \
          --approval auto \
          --allow-external \
          --cors "*"
    ports:
      - "${IPOLLOWORK_PORT:-8787}:8787"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8787/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 90s
    environment:
      CI: "true"
      IPOLLOWORK_TOKEN: ${IPOLLOWORK_TOKEN:-}
      IPOLLOWORK_HOST_TOKEN: ${IPOLLOWORK_HOST_TOKEN:-}
      IPOLLOWORK_DEV_ID: ${IPOLLOWORK_DEV_ID:-default}
      IPOLLOWORK_DEV_MODE: ${IPOLLOWORK_DEV_MODE:-1}
      IPOLLOWORK_DEV_OPENCODE_IMPORT_CONFIG_DIR: /persist/.config/opencode
      IPOLLOWORK_DEV_OPENCODE_IMPORT_DATA_DIR: /persist/.ipollowork-host-opencode-data
      IPOLLOWORK_SIDECAR_SOURCE: external

  web:
    <<: *shared
    depends_on:
      orchestrator:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e

        # --- Install system deps ---
        apt-get update -qq && apt-get install -y -qq --no-install-recommends \
          curl ca-certificates >/dev/null 2>&1

        # --- Bun + pnpm ---
        export BUN_INSTALL="/root/.bun"
        export PATH="$$BUN_INSTALL/bin:$$PATH"
        if ! command -v bun >/dev/null 2>&1; then
          curl -fsSL https://bun.sh/install | bash
        fi
        corepack enable && corepack prepare pnpm@10.27.0 --activate

        # --- Read token written by orchestrator ---
        if [ -f "/app/tmp/.dev-env-${IPOLLOWORK_DEV_ID:-default}" ]; then
          . "/app/tmp/.dev-env-${IPOLLOWORK_DEV_ID:-default}"
          export VITE_IPOLLOWORK_TOKEN="$$IPOLLOWORK_TOKEN"
        fi

        echo ""
        echo "============================================"
        echo "  iPolloWork web UI"
        echo "  URL:   http://localhost:${WEB_PORT:-5173}"
        echo "  Token: $${VITE_IPOLLOWORK_TOKEN:-<see orchestrator logs>}"
        echo "============================================"
        echo ""

        export VITE_IPOLLOWORK_URL="http://${IPOLLOWORK_PUBLIC_HOST:-localhost}:${IPOLLOWORK_PORT:-8787}"
        export VITE_IPOLLOWORK_PORT="${IPOLLOWORK_PORT:-8787}"
        export VITE_ALLOWED_HOSTS="all"
        export HOST="0.0.0.0"
        export PORT="5173"

        exec pnpm --filter @ipollowork/app exec vite \
          --host 0.0.0.0 \
          --port 5173 \
          --strictPort
    ports:
      - "${WEB_PORT:-5173}:5173"
    environment:
      IPOLLOWORK_DEV_ID: ${IPOLLOWORK_DEV_ID:-default}

volumes:
  pnpm-store:
    name: ipollowork-dev-pnpm-store
  bun-install:
    name: ipollowork-dev-bun-install
