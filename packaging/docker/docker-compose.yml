services:
  ipollowork-host:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Keep this in sync with apps/orchestrator/package.json if you want a pinned release.
        IPOLLOWORK_ORCHESTRATOR_VERSION: 0.11.22
    ports:
      - "8787:8787"
    environment:
      # Set these explicitly for stable sharing.
      # IPOLLOWORK_TOKEN: "..."
      # IPOLLOWORK_HOST_TOKEN: "..."
      # Optional: IPOLLOWORK_APPROVAL_MODE: "auto"
      # Optional: IPOLLOWORK_APPROVAL_TIMEOUT_MS: "30000"
      IPOLLOWORK_DATA_DIR: /data/ipollowork-orchestrator
      IPOLLOWORK_SIDECAR_DIR: /data/sidecars
    volumes:
      # Mount an existing project/workspace here.
      - ./workspace:/workspace
      # Persistent host data (OpenCode caches, server config, tokens).
      - ./data:/data
