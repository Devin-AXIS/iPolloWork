# IMPORTANT: appId intentionally matches the Tauri shell so both builds share
# the same macOS bundle identifier, keychain entries, Launchpad slot, and TCC
# permissions. In-place migration from Tauri to Electron depends on this.
appId: com.differentai.ipollowork
productName: iPollo
protocols:
  - name: iPolloWork
    schemes:
      - ipollowork
directories:
  output: dist-electron
files:
  - electron/**/*
  - server/**/*
  - "!server/dist/opencode-plugins/**"
  - package.json
extraResources:
  - from: ../../examples/plugin-packages/figma
    to: plugin-packages/figma
  # Templates are installed by copying their full directory into the local
  # library. Electron's virtual ASAR filesystem can read them but Node cannot
  # recursively copy an ASAR directory on macOS, so keep these assets real.
  - from: ../server/dist/bundled-templates
    to: server/dist/bundled-templates
  - from: ../app/dist
    to: app-dist
  - from: server/dist/opencode-plugins
    to: opencode-plugins
    filter:
      - "*.js"
  - from: ../../packages/docs
    to: ipollowork-docs
    filter:
      - "**/*.md"
      - "**/*.mdx"
      - "docs.json"
  - from: hyperframes-runtime
    to: hyperframes
    filter:
      - "**/*"
      - "!**/*.map"
      - "!node_modules/.bun/**/node_modules/.bin/**"
asar: true
asarUnpack:
  - node_modules/.pnpm/@lydell+node-pty*/**
  - node_modules/node-pty/**
npmRebuild: false
afterPack: scripts/electron-after-pack.cjs
afterSign: scripts/electron-after-sign.cjs
# electron-updater feed. The public GitHub Release carries the platform
# manifests consumed by the Electron desktop clients.
publish:
  - provider: github
    owner: Devin-AXIS
    repo: iPolloWork
    releaseType: release
mac:
  icon: resources/icons/mac/icon.icns
  category: public.app-category.developer-tools
  hardenedRuntime: true
  gatekeeperAssess: false
  # Notarization is performed by scripts/electron-after-sign.cjs so it can use
  # the App Store Connect API-key flow consistently for local releases and CI.
  notarize: false
  signIgnore:
    - "\\.(?:png|jpe?g|webp|gif|svg|ico|icns|pak|html?|css|mjs|js|cjs|json|map|txt|mdx?|woff2?|ttf|otf|pdf|ipwt)$"
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    NSMicrophoneUsageDescription: iPolloWork uses the microphone when you start Voice Mode so you can speak commands to your agent.
  extraResources:
    - from: resources/icons/mac
      to: icons/mac
      filter:
        - icon.icns
    - from: resources/sidecars
      to: sidecars
      filter:
        - opencode
        - opencode-aarch64-apple-darwin
        - opencode-x86_64-apple-darwin
        - ipollowork-orchestrator
        - ipollowork-orchestrator-aarch64-apple-darwin
        - ipollowork-orchestrator-x86_64-apple-darwin
        - versions.json
        - versions.json-aarch64-apple-darwin
        - versions.json-x86_64-apple-darwin
    - from: resources/helpers
      to: helpers
      filter:
        - "iPolloWork Computer Use.app/**"
  target:
    - dmg
    - zip
linux:
  icon: resources/icons/icon.png
  extraResources:
    - from: resources/sidecars
      to: sidecars
      filter:
        - opencode
        - opencode-aarch64-unknown-linux-gnu
        - opencode-x86_64-unknown-linux-gnu
        - ipollowork-orchestrator
        - ipollowork-orchestrator-aarch64-unknown-linux-gnu
        - ipollowork-orchestrator-x86_64-unknown-linux-gnu
        - versions.json
        - versions.json-aarch64-unknown-linux-gnu
        - versions.json-x86_64-unknown-linux-gnu
  target:
    - AppImage
    - tar.gz
win:
  icon: resources/icons/windows/icon.ico
  extraResources:
    - from: resources/icons
      to: icons
      filter:
        - icon.png
        - icon.ico
        - windows/icon.ico
    - from: resources/sidecars
      to: sidecars
      filter:
        - opencode.exe
        - opencode-aarch64-pc-windows-msvc.exe
        - opencode-x86_64-pc-windows-msvc.exe
        - ipollowork-orchestrator.exe
        - ipollowork-orchestrator-aarch64-pc-windows-msvc.exe
        - ipollowork-orchestrator-x86_64-pc-windows-msvc.exe
        - versions.json
        - versions.json-aarch64-pc-windows-msvc.exe
        - versions.json-x86_64-pc-windows-msvc.exe
  target:
    - nsis
nsis:
  include: build/installer.nsh
artifactName: ipollowork-${os}-${arch}-${version}.${ext}
